<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLB Matchups</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
    scroll-snap-type: y mandatory;
    overflow-y: scroll;
}

body.loading {
    opacity: 0;
}

/* GAME */
.game {
    height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    scroll-snap-align: start;
}

/* CONTENT */
.content {
    display: flex;
    height: 100%;
}

/* TEAM */
.team {
    flex: 1;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 60px 10px;
}

/* BG LOGO */
.bg {
    position: absolute;
    width: 70%;
    height: 70%;
    top: 15%;
    left: 15%;
    object-fit: contain;
    opacity: 0.35;
    filter: blur(5px);
    z-index: 0;
}

.team * {
    z-index: 1;
}

/* LOGO */
.logo {
    width: clamp(60px, 8vw, 100px);
    margin-bottom: 10px;
}

/* TEXT */
.team h1 {
    font-size: clamp(14px, 2vw, 20px);
    margin-bottom: 5px;
    text-align: center;
}

.game-time {
    font-size: 12px;
    opacity: 0.8;
    margin-bottom: 10px;
}

/* STATS */
.stat {
    width: 90%;
    margin: 6px 0;
}

.label {
    font-size: 12px;
}

.bar {
    height: 6px;
    background: #222;
    border-radius: 5px;
}

.fill {
    height: 100%;
    background: lime;
    border-radius: 5px;
}

/* 🔥 FLOATING VS */
.vs {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    font-size: clamp(18px, 5vw, 19px);
    font-weight: bold;
    color: white;

    z-index: 10;

    /* glow + floating feel */
    text-shadow:
        0 0 10px white,
        0 0 20px rgba(255,255,255,0.6);

    background: rgba(0,0,0,0.3);
    padding: 10px 20px;
    border-radius: 12px;
    backdrop-filter: blur(6px);
}

/* WIN % */
.win {
    position: absolute;
    bottom: 190px;
    left: 50%;
    transform: translateX(-50%);

    font-size: clamp(18px, 3vw, 26px);
    color: gold;
    text-shadow: 0 0 10px gold;
    font-weight: bold;
}

/* MOBILE FIXES */
@media (max-width: 600px) {
    .team {
        padding: 150px 10px; /* more space so VS doesn't collide */
    }

    .vs {
        padding: 8px 10px;
    }

    .win {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);

      font-size: clamp(18px, 3vw, 26px);
      color: gold;
      text-shadow: 0 0 10px gold;
      font-weight: bold;
    }
}
</style>
</head>

<body class="loading">

<div id="app"></div>

<script>
const BASE = "https://statsapi.mlb.com/api/v1";

/* TIME */
function formatGameTime(dateStr) {
    const d = new Date(dateStr);
    return d.toLocaleDateString(undefined,{month:"short",day:"numeric"}) +
           " • " +
           d.toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
}

/* FETCH */
async function getGames(){
    const today = new Date().toISOString().split("T")[0];
    const res = await fetch(`${BASE}/schedule?sportId=1&date=${today}`);
    const data = await res.json();
    return data.dates[0]?.games || [];
}

async function getStats(id){
    const res = await fetch(`${BASE}/teams/${id}/stats?stats=season&season=2025&group=hitting`);
    const data = await res.json();

    try { return data.stats[0].splits[0].stat; }
    catch { return {runs:700,rbi:650,avg:0.25,hits:1400}; }
}

/* PREDICT */
function predict(home, away){
    let h = home.runs*0.4 + home.rbi*0.3 + home.avg*100*0.2 + home.hits*0.1;
    let a = away.runs*0.4 + away.rbi*0.3 + away.avg*100*0.2 + away.hits*0.1;
    h *= 1.05;
    let t = h+a;
    return [(h/t)*100,(a/t)*100];
}

/* 🎨 COLOR FROM LOGO */
function getCenterColor(imgUrl, callback) {
    const img = new Image();
    img.crossOrigin = "Anonymous";

    img.onload = function () {
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const x = Math.floor(img.width * 0.6);
        const y = Math.floor(img.height * 0.6);

        const pixel = ctx.getImageData(x, y, 1, 1).data;
        const color = `rgb(${pixel[0]}, ${pixel[1]}, ${pixel[2]})`;

        callback(color);
    };

    img.src = imgUrl;
}

/* UI */
function createGame(g, hs, as, hp, ap){
    const home=g.teams.home.team;
    const away=g.teams.away.team;

    const maxRuns=Math.max(hs.runs,as.runs);
    const maxHits=Math.max(hs.hits,as.hits);
    const maxAvg=Math.max(hs.avg,as.avg);

    return `
    <div class="game">

        <div class="content">

            <div class="team">
                <img class="bg" src="https://www.mlbstatic.com/team-logos/${home.id}.svg">
                <img class="logo" src="https://www.mlbstatic.com/team-logos/${home.id}.svg">
                <h1>${home.name}</h1>
                <div class="game-time">${formatGameTime(g.gameDate)}</div>

                <div class="stat">
                    <div class="label">Runs (${hs.runs})</div>
                    <div class="bar"><div class="fill" style="width:${hs.runs/maxRuns*100}%"></div></div>
                </div>

                <div class="stat">
                    <div class="label">Avg (${hs.avg})</div>
                    <div class="bar"><div class="fill" style="width:${hs.avg/maxAvg*100}%"></div></div>
                </div>

                <div class="stat">
                    <div class="label">Hits (${hs.hits})</div>
                    <div class="bar"><div class="fill" style="width:${hs.hits/maxHits*100}%"></div></div>
                </div>
            </div>

            <div class="team">
                <img class="bg" src="https://www.mlbstatic.com/team-logos/${away.id}.svg">
                <img class="logo" src="https://www.mlbstatic.com/team-logos/${away.id}.svg">
                <h1>${away.name}</h1>
                <div class="game-time">${formatGameTime(g.gameDate)}</div>

                <div class="stat">
                    <div class="label">Runs (${as.runs})</div>
                    <div class="bar"><div class="fill" style="width:${as.runs/maxRuns*100}%"></div></div>
                </div>

                <div class="stat">
                    <div class="label">Avg (${as.avg})</div>
                    <div class="bar"><div class="fill" style="width:${as.avg/maxAvg*100}%"></div></div>
                </div>

                <div class="stat">
                    <div class="label">Hits (${as.hits})</div>
                    <div class="bar"><div class="fill" style="width:${as.hits/maxHits*100}%"></div></div>
                </div>
            </div>

        </div>

        <!-- FLOATING VS -->
        <div class="vs">VS</div>

        <!-- WIN -->
        <div class="win">${hp.toFixed(1)}% - ${ap.toFixed(1)}%</div>

    </div>
    `;
}

/* MAIN */
async function run(){
    const games=await getGames();
    let html="";

    for(let g of games){
        const hs=await getStats(g.teams.home.team.id);
        const as=await getStats(g.teams.away.team.id);
        const [hp,ap]=predict(hs,as);
        html+=createGame(g,hs,as,hp,ap);
    }

    document.getElementById("app").innerHTML=html;

    /* APPLY COLORS */
    document.querySelectorAll(".team").forEach(team => {
        const img = team.querySelector(".logo");

        getCenterColor(img.src, (color) => {
            team.style.background = `linear-gradient(${color}, black)`;
        });
    });

    document.body.classList.remove("loading");
}

run();
</script>

</body>
</html>
